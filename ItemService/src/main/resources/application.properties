spring.application.name=ItemService
server.port=8082

# MongoDB Config (Port 27017 is standard)
spring.data.mongodb.uri=mongodb://localhost:27017/item_db

# Kakfa topics
kafka.topics.payment-success=payment-success-topic
kafka.topics.payment-failure=payment-failure-topic
kafka.groups.inventory=inventory-group

# Kafka Connection
spring.kafka.bootstrap-servers=localhost:9092
# IMPORTANT: Use a unique group-id so ItemService gets its own copy of the message
spring.kafka.consumer.group-id=inventory-group
spring.kafka.consumer.auto-offset-reset=earliest

# Producer Config
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Optional: Add this to ensure complex JSON objects are handled correctly
spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Deserialization Config
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# This maps the incoming JSON to your new DTO class
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=com.github.xujia118.common.dto.PaymentDto
spring.kafka.consumer.properties.spring.json.trusted.packages=com.github.xujia118.*