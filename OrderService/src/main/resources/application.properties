spring.application.name=OrderService
server.port=8083

# Cassandra Connection
spring.cassandra.contact-points=${SPRING_CASSANDRA_CONTACT_POINTS:localhost}
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.keyspace-name=order_keyspace
spring.cassandra.schema-action=create_if_not_exists

# Kafka Configuration
# Use localhost:9092 for IDE, kafka:29092 if this app moves to Docker
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Producer Config
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Optional: Add this to ensure complex JSON objects are handled correctly
spring.kafka.producer.properties.spring.json.add.type.headers=true
