spring.application.name=PaymentService
server.port=8084

# Connection & Group
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest

# Deserialization (The "How")
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# We use ErrorHandlingDeserializer as the main one, just like your Java code
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer

# ErrorHandlingDelegate & JSON Config
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# This tells the ErrorHandlingDeserializer to use JsonDeserializer for the actual work
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.github.xujia118.*
spring.kafka.consumer.properties.spring.json.value.default.type=com.github.xujia118.paymentservice.model.Order

# PostgreSQL Connection (Note the port 5433)
spring.datasource.url=jdbc:postgresql://localhost:5433/payment_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Auditing Configuration
spring.jpa.auditing.enabled=true

# Logging
logging.level.org.apache.kafka=INFO
logging.level.org.springframework.kafka=DEBUG