services:
  # Relational DB for Account and Payment Services
  postgres-db:
    image: postgres:latest
    container_name: shopping-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shopping_db

  # NoSQL for Item Service metadata
  mongodb:
    image: mongo:latest
    container_name: shopping-mongo
    ports:
      - "27017:27017"

  # Column-family for Order Service history
  cassandra:
    image: cassandra:latest
    container_name: shopping-cassandra
    ports:
      - "9042:9042"

  # Kafka in KRaft Mode (ZooKeeperless)
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shopping-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # Static UUID for KRaft cluster identification
      CLUSTER_ID: 'MkU3ODA3OTYxOTgzNC00zh'