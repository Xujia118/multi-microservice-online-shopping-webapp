services:
  # --- INFRASTRUCTURE ---
  postgres-db:
    image: postgres:latest
    container_name: shopping-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: shopping_db

  payment-db:
    image: postgres:latest
    container_name: payment-postgres
    ports:
      - "5433:5432" # Host port 5433 -> Container port 5432
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payment_db
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d payment_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:latest
    container_name: shopping-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:latest
    container_name: shopping-cassandra
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shopping-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: 'MkU3ODA3OTYxOTgzNC00zh'

  redis:
    image: redis:latest
    container_name: shopping-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- INIT SCRIPTS ---
  init-cassandra:
    image: cassandra:latest
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        echo "Waiting for Cassandra to be fully ready..."
        until cqlsh cassandra 9042 -e "describe cluster"; do
          echo "Cassandra is unavailable - sleeping"
          sleep 2
        done
        echo "Cassandra is up - creating keyspace"
        cqlsh cassandra 9042 -e "CREATE KEYSPACE IF NOT EXISTS order_keyspace WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};"

  init-mongo:
    image: mongo:latest
    depends_on:
      mongodb:
        condition: service_healthy
    entrypoint: [ "/bin/bash", "-c" ]
    command:
      - |
        echo "Waiting for MongoDB to be ready..."
        until mongosh --host mongodb:27017 --eval "db.adminCommand('ping')"; do
          echo "MongoDB is unavailable - sleeping"
          sleep 2
        done
        echo "MongoDB is up - initializing replica set"
        mongosh --host mongodb:27017 --eval "rs.initiate({_id:'rs0', members:[{_id:0,host:'mongodb:27017'}]})"

  # --- SPRING MICROSERVICES ---
  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-service
    container_name: auth-service
    ports:
      - "8085:8085"
    environment:
      - AUTH_DB_HOST=postgres-db
      - AUTH_DB_USER=user
      - AUTH_DB_PASSWORD=password
      - ACCOUNT_SERVICE_URL=http://account-service:8081
      - KAFKA_HOST=kafka
    depends_on:
      - postgres-db
      - kafka

  account-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: account-service
    container_name: account-service
    ports:
      - "8081:8081"
    environment:
      - ACCOUNT_DB_HOST=postgres-db
      - ACCOUNT_DB_USER=user
      - ACCOUNT_DB_PASSWORD=password
      - ACCOUNT_DB_PORT=5432
      - KAFKA_HOST=kafka
    depends_on:
      - postgres-db
      - kafka

  item-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: item-service
    container_name: item-service
    ports:
      - "8082:8082"
    environment:
      - MONGO_DB_HOST=mongodb
      - MONGO_DB_PORT=27017
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_started

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: order-service
    container_name: order-service
    ports:
      - "8083:8083"
    environment:
      - CASSANDRA_HOST=cassandra
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
    depends_on:
      cassandra:
        condition: service_healthy
      kafka:
        condition: service_started
      init-cassandra:
        condition: service_completed_successfully

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: payment-service
    container_name: payment-service
    ports:
      - "8084:8084"
    environment:
      - PAYMENT_DB_HOST=payment-db
      - PAYMENT_DB_USER=user
      - PAYMENT_DB_PASSWORD=password
      - PAYMENT_DB_PORT=5432
      - KAFKA_HOST=kafka
      - KAFKA_PORT=29092
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_started

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway-service
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_HOST=auth-service   # Points to the docker service name
      - ACCOUNT_SERVICE_HOST=account-service
      - ITEM_SERVICE_HOST=item-service   # Points to the docker service name
      - ORDER_SERVICE_HOST=order-service
      - PAYMENT_SERVICE_HOST=payment-service
      - KAFKA_HOST=kafka
    depends_on:
      - auth-service
      - account-service
      - item-service
      - order-service
      - payment-service