spring:
  application:
    name: GatewayService
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: http://${AUTH_SERVICE_HOST:localhost}:8085
              predicates:
                - Path=/api/v1/auth/**

            - id: account-service
              uri: http://${ACCOUNT_SERVICE_HOST:localhost}:8081
              predicates:
                - Path=/api/v1/accounts/**

            - id: item-service
              uri: http://${ITEM_SERVICE_HOST:localhost}:8082
              predicates:
                - Path=/api/v1/items/**

            - id: order-service
              uri: http://${ORDER_SERVICE_HOST:localhost}:8083
              predicates:
                - Path=/api/v1/orders/**

            - id: payment-service
              uri: http://${PAYMENT_SERVICE_HOST:localhost}:8084
              predicates:
                - Path=/api/v1/payments/**

  # Kafka Configuration (for potential future use)
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092
logging:
  level:
    org.springframework.cloud.gateway: DEBUG

server:
  port: 8080

# Essential for debugging the "0 routes" issue
management:
  endpoints:
    web:
      exposure:
        include: gateway