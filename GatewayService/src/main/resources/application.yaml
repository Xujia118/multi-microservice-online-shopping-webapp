spring:
  application:
    name: GatewayService
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: item-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/items/**

            - id: auth-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/auth/**
logging:
  level:
    org.springframework.cloud.gateway: DEBUG

server:
  port: 8080

# Essential for debugging the "0 routes" issue
management:
  endpoints:
    web:
      exposure:
        include: gateway