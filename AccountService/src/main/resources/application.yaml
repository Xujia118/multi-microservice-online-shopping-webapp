spring:
  application:
    name: AccountService

  datasource:
    url: jdbc:postgresql://localhost:5432/shopping_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        # This helps Hibernate translate camelCase Java fields to snake_case DB columns
        physical_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8081